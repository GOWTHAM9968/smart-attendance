<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Login & Signup</title>
  <!-- Your uploaded style.css -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" id="container">
    
    <!-- Signup Form -->
    <div class="form-container sign-up-container">
      <form id="signupForm">
        <h1>Create Account</h1>
        <input type="text" id="signupName" placeholder="Full Name" required />
        <input type="email" id="signupEmail" placeholder="Email" required />
        <input type="password" id="signupPassword" placeholder="Password" required />
        <select id="signupRole" required>
          <option value="">Select Role</option>
          <option value="student">Student</option>
          <option value="faculty">Faculty</option>
          <option value="hod">HOD</option>
          <option value="admin">Admin</option>
        </select>
        <button type="submit">Sign Up</button>
      </form>
    </div>

    <!-- Login Form -->
    <div class="form-container sign-in-container">
      <form id="loginForm">
        <h1>Sign in</h1>
        <div id="errorMsg" style="color:red; font-size:14px;"></div>
        <input type="text" id="loginUsername" placeholder="Username" required />
        <input type="password" id="loginPassword" placeholder="Password" required />
        <select id="loginRole" required>
          <option value="">Select Role</option>
          <option value="student">Student</option>
          <option value="faculty">Faculty</option>
          <option value="hod">HOD</option>
          <option value="admin">Admin</option>
        </select>
        <button type="submit">Login</button>
      </form>
    </div>

    <!-- Panels for toggle -->
    <div class="overlay-container">
      <div class="overlay">
        <div class="overlay-panel overlay-left">
          <h1>Welcome Back!</h1>
          <p>To keep connected, please login with your credentials</p>
          <button class="ghost" id="signIn">Sign In</button>
        </div>
        <div class="overlay-panel overlay-right">
          <h1>Hello, Friend!</h1>
          <p>Enter your details and start your journey</p>
          <button class="ghost" id="signUp">Sign Up</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Toggle panels
    const signUpButton = document.getElementById('signUp');
    const signInButton = document.getElementById('signIn');
    const container = document.getElementById('container');

    signUpButton.addEventListener('click', () => {
      container.classList.add("right-panel-active");
    });

    signInButton.addEventListener('click', () => {
      container.classList.remove("right-panel-active");
    });

    // Hardcoded credentials
    const credentials = {
      student: { username: "student1", password: "student123", dashboard: "studentdsahboard.html" },
      faculty: { username: "faculty1", password: "faculty123", dashboard: "facultydashboard.html" },
      hod: { username: "hod1", password: "hod123", dashboard: "hoddashboard.html" },
      admin: { username: "admin", password: "admin123", dashboard: "admindashboard.html" }
    };

    // Handle Login
    document.getElementById("loginForm").addEventListener("submit", function(e){
      e.preventDefault();
      const username = document.getElementById("loginUsername").value.trim();
      const password = document.getElementById("loginPassword").value.trim();
      const role = document.getElementById("loginRole").value;

      if(!username || !password || !role){
        document.getElementById("errorMsg").innerText = "All fields are required!";
        return;
      }

      const cred = credentials[role];
      if(cred.username === username && cred.password === password){
        localStorage.setItem("loggedUser", JSON.stringify({ username, role }));
        window.location.href = cred.dashboard;
      } else {
        document.getElementById("errorMsg").innerText = "Invalid credentials!";
      }
    });

    // Handle Signup (just saves to localStorage as demo)
    document.getElementById("signupForm").addEventListener("submit", function(e){
      e.preventDefault();
      const name = document.getElementById("signupName").value.trim();
      const email = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value.trim();
      const role = document.getElementById("signupRole").value;

      if(name && email && password && role){
        let users = JSON.parse(localStorage.getItem("users")) || [];
        users.push({ name, email, password, role });
        localStorage.setItem("users", JSON.stringify(users));
        alert("Signup successful! Now login.");
        container.classList.remove("right-panel-active");
      }
    });
  </script>
</body>
</html>
