<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="profile.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <h2 class="logo">MyCollege</h2>
    <nav>
      <a href="admindashboard.html"><span class="material-icons">dashboard</span> Dashboard</a>
      <button class="logout-btn" onclick="logout()">
        <span class="material-icons">logout</span> Logout
      </button>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <h1>👤 Profile Page</h1>
    </header>

    <section class="profile-card">
      <div class="profile-header">
        <span class="material-icons avatar">account_circle</span>
        <h2 id="userName">Student Name</h2>
        <p id="userCollege">College Name</p>
      </div>

      <div class="profile-info">
        <p><strong>Email:</strong> <span id="userEmail">student@example.com</span></p>
        <p><strong>Course:</strong> <span id="userCourse">Not Assigned</span></p>
        <p><strong>Phone:</strong> <span id="userPhone">+91-XXXXXXXXXX</span></p>
      </div>

      <div class="profile-actions">
        <button onclick="editProfile()" class="btn-primary">
          <span class="material-icons">edit</span> Edit Profile
        </button>
        <button onclick="changePassword()" class="btn-secondary">
          <span class="material-icons">lock</span> Change Password
        </button>
      </div>
    </section>
  </main>

  <script>
    // Simulated user data from URL or session
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name") || "Student";
    const email = params.get("email") || "student@example.com";
    const college = params.get("college") || "Unknown College";
    const course = params.get("course") || "Computer Science";

    document.getElementById("userName").innerText = name;
    document.getElementById("userEmail").innerText = email;
    document.getElementById("userCollege").innerText = college;
    document.getElementById("userCourse").innerText = course;

    function logout() {
      window.location.href = "college.html";
    }

    function editProfile() {
      alert("Edit profile functionality coming soon!");
    }

    function changePassword() {
      alert("Change password functionality coming soon!");
    }
  </script>
</body>
</html>
